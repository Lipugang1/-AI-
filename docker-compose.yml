version: '3.8'

services:
  app:
    build: .
    container_name: sanheyi-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=sanheyi
      - DB_PASSWORD=sanheyi2024
      - DB_NAME=sanheyi
      - DB_PORT=3306
      - JWT_SECRET=sanheyi_super_secret_key_2024_!@#$%^&*()
      - AI_API_BASE=${AI_API_BASE:-https://api.xiaomimimo.com/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_VISION_MODEL=mimo-v2.5
      - AI_TEXT_MODEL=mimo-v2.5
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sanheyi-network

  mysql:
    image: mysql:8.0
    container_name: sanheyi-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root2024
      - MYSQL_DATABASE=sanheyi
      - MYSQL_USER=sanheyi
      - MYSQL_PASSWORD=sanheyi2024
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot2024"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sanheyi-network

volumes:
  mysql-data:

networks:
  sanheyi-network:
    driver: bridge
